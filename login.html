<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>دخول - منصة المحاضرات</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
    <link rel="stylesheet" href="style.css" />
</head>
<body>

    <nav class="navbar">
        <div class="nav-logo">
            منصة <span>المحاضرات</span>
        </div>
        <div class="nav-links" id="navLinks">
            <a href="index.html">الرئيسية</a>
            <a href="lectures.html">المحاضرات</a>
            <a href="contact.html">تواصل معنا</a>
            <a href="login.html" class="nav-cta active">دخول</a>
        </div>
        <div class="hamburger" id="hamburger">
            <span></span><span></span><span></span>
        </div>
    </nav>

    <div class="auth-page">
        <div class="auth-card">
            <h2 class="auth-logo">منصة <span>المحاضرات</span></h2>
            <p class="auth-subtitle">سجل دخولك أو أنشئ حساباً جديداً للوصول للمحاضرات</p>

            <div class="auth-tabs">
                <button class="auth-tab active" onclick="switchTab('login')">تسجيل الدخول</button>
                <button class="auth-tab" onclick="switchTab('register')">إنشاء حساب</button>
            </div>

            <div id="loginPanel">
                <form onsubmit="alert('تم تسجيل الدخول بنجاح!'); window.location.href='index.html'; return false;">
                    <div class="form-group">
                        <label>البريد الإلكتروني</label>
                        <input type="email" name="email" placeholder="example@domain.com" required />
                    </div>
                    <div class="form-group">
                        <label>كلمة المرور</label>
                        <input type="password" name="password" placeholder="••••••••" required />
                    </div>
                    <button type="submit" class="btn btn-primary" style="width:100%;">دخول</button>
                </form>
            </div>

            <div id="registerPanel" style="display:none;">
                <form onsubmit="alert('تم إنشاء الحساب بنجاح!'); switchTab('login'); return false;">
                    <div class="form-group">
                        <label>الاسم</label>
                        <input type="text" name="name" placeholder="اسمك الكامل" required />
                    </div>
                    <div class="form-group">
                        <label>البريد الإلكتروني</label>
                        <input type="email" name="email" placeholder="example@domain.com" required />
                    </div>
                    <div class="form-group">
                        <label>كلمة المرور</label>
                        <input type="password" name="password" placeholder="••••••••" required />
                    </div>
                    <button type="submit" class="btn btn-primary" style="width:100%;">إنشاء حساب</button>
                </form>
            </div>

            <div class="auth-footer">
                © 2026 منصة المحاضرات
            </div>
        </div>
    </div>

    <footer class="footer" style="margin-top:40px;">
        <div class="footer-content">
            <div class="footer-brand">منصة <span>المحاضرات</span></div>
            <p>منصتك الموثوقة لتنظيم ومتابعة المحاضرات التعليمية</p>
            
            <div class="social-icons">
                <a href="https://github.com" target="_blank" aria-label="GitHub"><i class="fab fa-github"></i></a>
                <a href="https://twitter.com" target="_blank" aria-label="Twitter"><i class="fab fa-twitter"></i></a>
                <a href="https://linkedin.com" target="_blank" aria-label="LinkedIn"><i class="fab fa-linkedin-in"></i></a>
                <a href="https://youtube.com" target="_blank" aria-label="YouTube"><i class="fab fa-youtube"></i></a>
            </div>

            <div class="footer-bottom">
                <span>© 2026 منصة المحاضرات. جميع الحقوق محفوظة.</span>
                <span>🇸🇩 السودان</span>
            </div>
        </div>
    </footer>

    <script src="script.js"></script>
</body>
</html>
